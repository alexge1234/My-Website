            Open to fully remote B2B marketing roles. The fastest way to reach

          </p>

            <a class="btn btn--solid" href="mailto:alexge1234@gmail.com">Email me</a>

      <section class="wrap section--tight">
        <!--
          ABOUT THIS FORM
          A static site cannot send email by itself, there is no server behind it.
          Two ways to make this form actually deliver messages, both free:

          1. EASIEST: leave the mailto button above as your only contact method
             and delete this whole <form> if you do not want a form.

          2. FREE FORM SERVICE: create a free account at formspree.io (or web3forms.com),
             paste the endpoint they give you into the form's "action" below,
             and the form will email submissions to you. No backend to manage.
             Replace YOUR_FORM_ID with the real id from your account.
        -->
        <form
          class="contact-card reveal"
          action="https://formspree.io/f/YOUR_FORM_ID"
          method="POST"
        >
          <label class="field">
            <span>Your name</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label class="field">
            <span>Your email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span>Message</span>
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button class="btn btn--solid" type="submit">Send message</button>
        </form>
      </section>
    </main>
